name: todo-app-learn

services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://todo:todo@db:5432/todo_app?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-secret-change-me}
      AUTH_TRUST_HOST: "true"
    volumes:
      # ソースをマウントしてホットリロード。node_modules と .next は
      # コンテナ側（イメージ内）のものを使うため匿名ボリュームで隠す
      - ./:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
